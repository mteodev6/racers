<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web F1 Multiplayer Arcade</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; user-select: none; }
        
        /* UI Layout */
        #top-left { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; }
        h3 { margin: 0 0 5px 0; color: #ff3333; font-style: italic; text-transform: uppercase; }
        #status { color: #888; font-size: 12px; margin-bottom: 10px; }
        #race-state { font-size: 20px; font-weight: bold; color: #FFC107; }
        
        /* Top Center Timer */
        #timer-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 8px; border: 2px solid #444; }
        #timer { font-size: 28px; color: #fff; font-family: monospace; font-weight: bold; }

        /* Bottom Left Speedometer */
        #speed-container { position: absolute; bottom: 20px; left: 20px; color: #fff; font-style: italic; }
        #speedometer { font-size: 40px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        #speed-label { font-size: 16px; color: #aaa; }

        /* Bottom Right Minimap */
        #minimap-container { position: absolute; bottom: 20px; right: 20px; border: 3px solid #333; border-radius: 50%; overflow: hidden; background: rgba(0, 0, 0, 0.6); width: 200px; height: 200px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #minimap { width: 100%; height: 100%; }

        /* Center Countdown */
        #countdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #countdown-text { font-size: 150px; font-weight: 900; color: #ff3333; text-shadow: 4px 4px 0 #fff, 0 0 50px #ff3333; font-style: italic; opacity: 0; transition: transform 0.2s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div id="top-left">
        <h3>Arcade F1</h3>
        <div id="status">Connecting to network...</div>
        <div id="race-state">Laps: 1/3</div>
    </div>

    <div id="timer-container"><div id="timer">00:00.00</div></div>
    
    <div id="speed-container">
        <div id="speedometer">0</div>
        <div id="speed-label">KM/H</div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap" width="200" height="200"></canvas>
    </div>

    <div id="countdown-overlay"><div id="countdown-text">3</div></div>

    <script>
        // --- 1. GAME SETTINGS & STATE ---
        const myId = 'p_' + Math.random().toString(36).substr(2, 6);
        const players = {}; 
        
        let currentLap = 1;
        let nextCheckpointIndex = 0;
        const totalLaps = 3;

        // Game States: 0 = Setup, 1 = Countdown, 2 = Racing, 3 = Finished
        let gameState = 0; 
        let raceStartTime = 0;

        // Arcade Driving Physics (Tuned steering)
        let speed = 0;
        const maxSpeed = 1.3; 
        const acceleration = 0.03; 
        const deceleration = 0.01;
        const turnSpeed = 0.025; // LOWERED: Smoother steering

        const keys = { w: false, a: false, s: false, d: false };

        // --- 2. THREE.JS ENVIRONMENT SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        scene.fog = new THREE.Fog(0x87ceeb, 200, 500); 
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(100, 200, 100);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048; 
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- 3. TRACK & ENVIRONMENT GENERATION ---
        const grassGeo = new THREE.PlaneGeometry(1000, 1000);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2d862d }); 
        const ground = new THREE.Mesh(grassGeo, grassMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const trackPoints = [
            new THREE.Vector3(-100, 0, -80), new THREE.Vector3(0, 0, -100),
            new THREE.Vector3(100, 0, -80), new THREE.Vector3(120, 0, 0),
            new THREE.Vector3(100, 0, 80), new THREE.Vector3(0, 0, 100),
            new THREE.Vector3(-80, 0, 60), new THREE.Vector3(-120, 0, 0),
            new THREE.Vector3(-100, 0, -80)
        ];
        const trackCurve = new THREE.CatmullRomCurve3(trackPoints);
        trackCurve.closed = true;

        const roadWidth = 22;
        const roadGeo = new THREE.TubeGeometry(trackCurve, 200, roadWidth / 2, 8, true);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.scale.set(1, 0.05, 1); 
        road.position.y = 0.1; 
        road.receiveShadow = true;
        scene.add(road);

        const centerlineGeo = new THREE.TubeGeometry(trackCurve, 200, 0.2, 8, true);
        const centerlineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const centerline = new THREE.Mesh(centerlineGeo, centerlineMat);
        centerline.position.y = 0.2; 
        scene.add(centerline);

        // --- 4. RACING SYSTEM: CHECKPOINTS & START LINE ---
        const checkpoints = [];
        const numCheckpoints = 10; // Added more checkpoints for reliability
        for (let i = 0; i < numCheckpoints; i++) {
            checkpoints.push(trackCurve.getPointAt(i / numCheckpoints));
        }

        // FIXED: Flat Box for Start Line (No weird twisting)
        const startPoint = trackCurve.getPointAt(0); 
        const startTangent = trackCurve.getTangentAt(0); 
        const slBox = new THREE.BoxGeometry(roadWidth + 2, 0.1, 2);
        const slMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
        const slLine = new THREE.Mesh(slBox, slMat);
        slLine.position.set(startPoint.x, 0.15, startPoint.z);
        // Force the Y level so it doesn't dip into the ground
        slLine.lookAt(startPoint.x + startTangent.x, 0.15, startPoint.z + startTangent.z);
        scene.add(slLine);

        // --- 5. F1 CAR GENERATOR ---
        function createF1Car(colorHex) {
            const carGroup = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex });
            const wingMat = new THREE.MeshStandardMaterial({ color: colorHex });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 5), bodyMat);
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1.5), bodyMat);
            nose.position.z = -3; nose.position.y = -0.1;
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1), new THREE.MeshStandardMaterial({color: 0x000000}));
            cockpit.position.y = 0.5; cockpit.position.z = -0.3;
            const frontWing = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 0.8), wingMat);
            frontWing.position.z = -3.8; frontWing.position.y = -0.2;
            const rearWing = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 1.2), wingMat);
            rearWing.position.z = 2.4; rearWing.position.y = 0.6;
            const supp1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.2), wingMat);
            supp1.position.set(1.5, 0.3, 2.4); 
            const supp2 = supp1.clone(); supp2.position.x = -1.5; 

            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.6, 12);
            wheelGeo.rotateZ(Math.PI / 2); 
            const fwL = new THREE.Mesh(wheelGeo, wheelMat); fwL.position.set(-1.1, 0, -2.5);
            const fwR = fwL.clone(); fwR.position.x = 1.1;
            const rwL = fwL.clone(); rwL.scale.set(1.2,1.2,1.2); rwL.position.set(-1.3, 0.1, 1.8); 
            const rwR = rwL.clone(); rwR.position.x = 1.3;

            carGroup.add(body, nose, cockpit, frontWing, rearWing, supp1, supp2, fwL, fwR, rwL, rwR);
            carGroup.children.forEach(c => { c.castShadow = true; }); 
            return carGroup;
        }

        // --- 6. INITIALIZE MY CAR ---
        const myCar = createF1Car(0xff3333); 
        // FIXED: Safe Ground placement
        myCar.position.set(startPoint.x - 3, 0.5, startPoint.z); 
        // Calculate raw Y rotation to face the track direction without tilting
        const angleY = Math.atan2(startTangent.x, startTangent.z);
        myCar.rotation.y = angleY;
        scene.add(myCar);

        const relativeCameraOffset = new THREE.Vector3(0, 4, 10);

        // --- 7. INPUTS & EVENTS ---
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 8. MINIMAP LOGIC ---
        const mapCanvas = document.getElementById('minimap');
        const mapCtx = mapCanvas.getContext('2d');
        const mapBounds = 150; // Map stretches from -150 to +150
        
        function drawMinimap() {
            mapCtx.clearRect(0, 0, 200, 200);
            
            // Helper to translate 3D space to 2D canvas (0-200px)
            const toMap = (val) => ((val + mapBounds) / (mapBounds * 2)) * 200;

            // Draw Track Loop
            mapCtx.beginPath();
            mapCtx.strokeStyle = '#555';
            mapCtx.lineWidth = 15;
            for(let i=0; i<=100; i++) {
                const pt = trackCurve.getPointAt(i/100);
                if(i===0) mapCtx.moveTo(toMap(pt.x), toMap(pt.z));
                else mapCtx.lineTo(toMap(pt.x), toMap(pt.z));
            }
            mapCtx.stroke();

            // Draw Start Line Marker
            mapCtx.fillStyle = 'white';
            mapCtx.fillRect(toMap(startPoint.x)-2, toMap(startPoint.z)-2, 4, 4);

            // Draw Opponents (Blue)
            mapCtx.fillStyle = '#3366ff';
            for (const id in players) {
                const opp = players[id];
                mapCtx.beginPath();
                mapCtx.arc(toMap(opp.position.x), toMap(opp.position.z), 4, 0, Math.PI*2);
                mapCtx.fill();
            }

            // Draw Me (Red)
            mapCtx.fillStyle = '#ff3333';
            mapCtx.beginPath();
            mapCtx.arc(toMap(myCar.position.x), toMap(myCar.position.z), 5, 0, Math.PI*2);
            mapCtx.fill();
        }

        // --- 9. ABLY MULTIPLAYER LOGIC ---
        const ABLY_API_KEY = 'mWq-qg.aSAwag:CfLtHjHdS9lBnkqrB9RzytbXrCK76hPhXFoFWa8c65g'; 
        
        const ably = new Ably.Realtime({ key: ABLY_API_KEY, clientId: myId });
        const channel = ably.channels.get('f1-lobby');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = 'Network Connected!';
            document.getElementById('status').style.color = '#4CAF50';
            
            // Start the Countdown Sequence
            startCountdown();

            channel.subscribe('move', (message) => {
                const data = message.data;
                if (message.clientId === myId) return; 

                if (!players[message.clientId]) {
                    const otherCar = createF1Car(0x3366ff); 
                    otherCar.position.y = 0.5;
                    scene.add(otherCar);
                    players[message.clientId] = otherCar;
                }
                players[message.clientId].position.set(data.x, data.y, data.z);
                
                const q = new THREE.Quaternion();
                q.setFromEuler(new THREE.Euler(0, data.rotation, 0));
                players[message.clientId].quaternion.copy(q);
            });

            channel.presence.subscribe('leave', (member) => {
                if (players[member.clientId]) { scene.remove(players[member.clientId]); delete players[member.clientId]; }
            });
            channel.presence.enter();
        });

        function broadcastPosition() {
            if (ably.connection.state === 'connected' && gameState === 2) {
                const euler = new THREE.Euler().setFromQuaternion(myCar.quaternion);
                channel.publish('move', { x: myCar.position.x, y: myCar.position.y, z: myCar.position.z, rotation: euler.y });
            }
        }
        setInterval(broadcastPosition, 100);

        // --- 10. GAME SYSTEMS ---
        function startCountdown() {
            gameState = 1;
            const cdText = document.getElementById('countdown-text');
            let count = 3;
            cdText.style.opacity = 1;
            
            const timerObj = setInterval(() => {
                count--;
                if(count > 0) {
                    cdText.innerText = count;
                    cdText.style.transform = `scale(${1 + Math.random()*0.2})`; // little pop effect
                } else if (count === 0) {
                    cdText.innerText = "GO!";
                    cdText.style.color = "#4CAF50";
                    gameState = 2; // Unlock driving
                    raceStartTime = Date.now();
                } else {
                    clearInterval(timerObj);
                    cdText.style.opacity = 0;
                }
            }, 1000);
        }

        function updateUI() {
            // Speedometer (1.3 top speed * roughly 200 multiplier looks like real KMH)
            const displaySpeed = Math.abs(speed * 200).toFixed(0);
            document.getElementById('speedometer').innerText = displaySpeed;

            // Timer
            if (gameState === 2) {
                const elapsed = Date.now() - raceStartTime;
                const min = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                const sec = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                const ms = Math.floor((elapsed % 1000) / 10).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${min}:${sec}.${ms}`;
            }

            drawMinimap();
        }

        // --- 11. MAIN GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // A. Arcade Physics (Only if racing)
            if (gameState === 2) {
                if (keys.w) speed += acceleration;
                if (keys.s) speed -= acceleration * 0.6; 
                
                if (!keys.w && !keys.s) {
                    if (speed > 0) speed = Math.max(0, speed - deceleration);
                    if (speed < 0) speed = Math.min(0, speed + deceleration);
                }

                speed = THREE.MathUtils.clamp(speed, -maxSpeed * 0.4, maxSpeed);

                // FIXED: Must be moving to steer.
                if (Math.abs(speed) > 0.05) {
                    const direction = speed > 0 ? 1 : -1;
                    if (keys.a) myCar.rotateY(turnSpeed * direction);
                    if (keys.d) myCar.rotateY(-turnSpeed * direction);
                }

                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(myCar.quaternion); 
                forward.multiplyScalar(speed); 
                myCar.position.add(forward); 

                // FIXED: Enforce strictly flat Y coordinate
                myCar.position.y = 0.5; 
                myCar.rotation.x = 0; 
                myCar.rotation.z = 0;

                // B. Checkpoint Detection
                const targetPoint = checkpoints[nextCheckpointIndex];
                
                // FIXED: Measure distance strictly on X/Z axis, ignore height. Radiused to 25.
                const dx = myCar.position.x - targetPoint.x;
                const dz = myCar.position.z - targetPoint.z;
                const flatDistance = Math.sqrt(dx*dx + dz*dz);

                if (flatDistance < 25) {
                    nextCheckpointIndex++;
                    if (nextCheckpointIndex >= numCheckpoints) {
                        nextCheckpointIndex = 0; 
                        currentLap++;
                        
                        if (currentLap > totalLaps) {
                            gameState = 3; // Finished
                            document.getElementById('race-state').innerText = "🏁 FINISHED!";
                            document.getElementById('race-state').style.color = '#4CAF50';
                            document.getElementById('countdown-text').innerText = "FINISH";
                            document.getElementById('countdown-text').style.opacity = 1;
                        } else {
                            document.getElementById('race-state').innerText = `Laps: ${currentLap}/${totalLaps}`;
                        }
                    }
                }
            } else if (gameState === 3) {
                // Auto decelerate when finished
                speed = Math.max(0, speed - deceleration);
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(myCar.quaternion).multiplyScalar(speed);
                myCar.position.add(forward); 
            }

            // Update user interface and minimap
            updateUI();

            // C. Third-Person Camera Elastic Follow
            const cameraOffset = relativeCameraOffset.clone().applyMatrix4(myCar.matrixWorld);
            camera.position.lerp(cameraOffset, 0.15); 
            camera.lookAt(myCar.position);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
