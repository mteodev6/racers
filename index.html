<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web F1 Multiplayer Arcade</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; user-select: none; }

        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .menu-box { background: #222; padding: 40px; border-radius: 12px; border: 2px solid #444; text-align: center; color: white; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .menu-box h1 { margin-top: 0; color: #ff3333; font-style: italic; font-size: 36px; text-transform: uppercase; text-shadow: 2px 2px 0 #fff; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .input-group input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px; border: none; font-size: 16px; background: #111; color: #fff; }
        .input-group input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 6px; cursor: pointer; background: #111; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 20px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; text-transform: uppercase; }
        button:hover { background: #45a049; }

        #game-ui { display: none; }
        #top-left { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; }
        h3 { margin: 0 0 5px 0; color: #ff3333; font-style: italic; text-transform: uppercase; }
        #status { color: #888; font-size: 12px; margin-bottom: 10px; }
        #race-state { font-size: 20px; font-weight: bold; color: #FFC107; }
        #best-lap { font-size: 13px; color: #00ffaa; margin-top: 6px; font-family: monospace; }

        #timer-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 8px; border: 2px solid #444; }
        #timer { font-size: 28px; color: #fff; font-family: monospace; font-weight: bold; }

        #speed-container { position: absolute; bottom: 20px; left: 20px; color: #fff; font-style: italic; }
        #speedometer { font-size: 40px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        #speed-label { font-size: 16px; color: #aaa; }

        #minimap-container { position: absolute; bottom: 20px; right: 20px; border: 3px solid #333; border-radius: 50%; overflow: hidden; background: rgba(0, 0, 0, 0.6); width: 200px; height: 200px; }

        #countdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 50; }
        #countdown-text { font-size: 150px; font-weight: 900; color: #ff3333; text-shadow: 4px 4px 0 #fff, 0 0 50px #ff3333; font-style: italic; opacity: 0; transition: transform 0.2s; }

        #hazard-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 22px; font-weight: 900; color: #ff6600; text-shadow: 2px 2px 0 #000; opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 60; white-space: nowrap; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div id="main-menu">
        <div class="menu-box">
            <h1>Arcade F1</h1>
            <div class="input-group">
                <label>Driver Name</label>
                <input type="text" id="player-name" value="Racer" maxlength="10">
            </div>
            <div class="input-group">
                <label>Car Color</label>
                <input type="color" id="player-color" value="#ff3333">
            </div>
            <button id="join-btn">Start Engine</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="top-left">
            <h3>Arcade F1</h3>
            <div id="status">Connecting to network...</div>
            <div id="race-state">Lap 1 / 3</div>
            <div id="best-lap">Best Lap: --:--.--</div>
        </div>
        <div id="timer-container"><div id="timer">00:00.00</div></div>
        <div id="speed-container">
            <div id="speedometer">0</div>
            <div id="speed-label">KM/H</div>
        </div>
        <div id="minimap-container"><canvas id="minimap" width="200" height="200"></canvas></div>
    </div>

    <div id="hazard-msg"></div>
    <div id="countdown-overlay"><div id="countdown-text">3</div></div>

    <script src="game.js"></script>
</body>
</html>
